<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NJ Leads Map — Bloomfield Area</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div id="map"></div>
  <button class="toggle-panel" id="togglePanel">&#9776;</button>

  <div class="stats-panel" id="statsPanel">
    <h3>NJ Leads Map <span class="live-badge"><span class="live-dot"></span>LIVE</span></h3>
    <div class="stat"><span>Total Leads</span><span class="val" id="total">...</span></div>
    <div class="stat"><span>With Email</span><span class="val" id="withEmail">...</span></div>
    <div class="stat"><span>No Email</span><span class="val" id="noEmail">...</span></div>
    <div class="stat"><span>With Website</span><span class="val" id="withSite">...</span></div>
    <div class="stat"><span>No Website</span><span class="val" id="noSite">...</span></div>
    <div class="last-updated" id="lastUpdated"></div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div> Has Email</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div> No Email</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div> No Website</div>
      <div class="legend-item"><div class="legend-dot" style="background:#000"></div> HQ (27 Bloomfield Ave)</div>
    </div>

    <div style="margin-top:10px; font-size:12px; font-weight:600; color:#666;">Status Filter</div>
    <div class="filter-btns" id="statusFilters">
      <button class="active" data-filter="all">All</button>
      <button data-filter="no-email">No Email</button>
      <button data-filter="no-site">No Website</button>
      <button data-filter="no-email-no-site">No Email &amp; No Website</button>
    </div>

    <button class="route-toggle" id="routeToggle">&#9654; Show Optimized Route</button>
    <div class="route-stat" id="routeStat"></div>

    <div style="margin-top:10px; font-size:12px; font-weight:600; color:#666;">Business Type</div>
    <div class="filter-btns" id="typeFilters">
      <button class="active" data-type="all">All Types</button>
      <button data-type="salon">Salon</button>
      <button data-type="barber">Barbershop</button>
      <button data-type="hair">Hairdresser</button>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>

</html>
