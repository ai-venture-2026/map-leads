<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NJ Leads Map — Bloomfield Area</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  #map { width: 100%; height: 100vh; }
  .stats-panel {
    position: absolute; top: 10px; right: 10px; z-index: 1000;
    background: #fff; border-radius: 8px; padding: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    min-width: 220px; font-size: 14px; max-height: 90vh; overflow-y: auto;
    transition: transform 0.3s ease;
  }
  .stats-panel.collapsed { transform: translateX(calc(100% + 20px)); }
  .toggle-panel {
    display: none; position: absolute; top: 10px; right: 10px; z-index: 1001;
    background: #2563eb; color: #fff; border: none; border-radius: 8px;
    width: 40px; height: 40px; font-size: 20px; cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .stats-panel h3 { margin-bottom: 8px; font-size: 16px; }
  .stats-panel .stat { display: flex; justify-content: space-between; padding: 4px 0; }
  .stats-panel .stat .val { font-weight: 700; }
  .legend { margin-top: 12px; border-top: 1px solid #eee; padding-top: 8px; }
  .legend-item { display: flex; align-items: center; gap: 6px; padding: 2px 0; font-size: 13px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
  .filter-btns { margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btns button {
    padding: 6px 12px; border: 1px solid #ddd; border-radius: 4px; cursor: pointer;
    font-size: 13px; background: #fff;
  }
  .filter-btns button.active { background: #2563eb; color: #fff; border-color: #2563eb; }
  .leaflet-popup-content { font-size: 13px; line-height: 1.5; max-width: 280px; }
  .popup-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
  .popup-row { display: flex; gap: 4px; flex-wrap: wrap; }
  .popup-label { color: #666; min-width: 55px; }
  .popup-email { color: #2563eb; word-break: break-all; }
  .popup-no-email { color: #ef4444; font-style: italic; }
  .popup-tag {
    display: inline-block; padding: 1px 6px; border-radius: 3px;
    font-size: 11px; margin-top: 4px;
  }
  .tag-website { background: #dcfce7; color: #166534; }
  .tag-no-website { background: #fee2e2; color: #991b1b; }
  .tag-email { background: #dbeafe; color: #1e40af; }
  .hq-marker {
    background: #000; color: #fff; padding: 4px 8px; border-radius: 4px;
    font-weight: 700; font-size: 12px; white-space: nowrap;
  }
  .live-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; color: #16a34a; margin-left: 8px;
  }
  .live-dot {
    width: 6px; height: 6px; border-radius: 50%; background: #16a34a;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .last-updated { font-size: 11px; color: #999; margin-top: 4px; }

  /* Mobile */
  @media (max-width: 640px) {
    .toggle-panel { display: block; }
    .stats-panel {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: 280px; max-width: 80vw; border-radius: 0;
      padding: 60px 16px 16px; max-height: 100vh;
    }
    .stats-panel.collapsed { transform: translateX(100%); }
    .filter-btns { flex-direction: column; }
    .filter-btns button { padding: 10px 12px; font-size: 14px; }
    .leaflet-popup-content { max-width: 220px; font-size: 12px; }
    .popup-name { font-size: 13px; }
  }
</style>
</head>
<body>
<div id="map"></div>
<button class="toggle-panel" id="togglePanel">&#9776;</button>
<div class="stats-panel" id="statsPanel">
  <h3>NJ Leads Map <span class="live-badge"><span class="live-dot"></span>LIVE</span></h3>
  <div class="stat"><span>Total Leads</span><span class="val" id="total">...</span></div>
  <div class="stat"><span>With Email</span><span class="val" id="withEmail">...</span></div>
  <div class="stat"><span>No Email</span><span class="val" id="noEmail">...</span></div>
  <div class="stat"><span>With Website</span><span class="val" id="withSite">...</span></div>
  <div class="stat"><span>No Website</span><span class="val" id="noSite">...</span></div>
  <div class="last-updated" id="lastUpdated"></div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div> Has Email</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div> No Email</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div> No Website</div>
    <div class="legend-item"><div class="legend-dot" style="background:#000"></div> HQ (27 Bloomfield Ave)</div>
  </div>
  <div class="filter-btns">
    <button class="active" data-filter="all">All</button>
    <button data-filter="email">Has Email</button>
    <button data-filter="no-email">No Email</button>
    <button data-filter="no-site">No Website</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// Supabase config
const SUPABASE_URL = 'https://hpmnsnpacbwwumcoeflx.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhwbW5zbnBhY2J3d3VtY29lZmx4Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MzE0OTIwNywiZXhwIjoyMDg4NzI1MjA3fQ.RADlqya5XegMIs-GuvfnJBmP9tFsp59HSlvag9PHdyI';
const REFRESH_INTERVAL = 30000; // 30 seconds

// HQ location: 27 Bloomfield Ave, Bloomfield, NJ 07003
const HQ = [40.8094, -74.1854];

const map = L.map('map').setView(HQ, 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors', maxZoom: 19
}).addTo(map);

// HQ marker
const hqIcon = L.divIcon({ className: '', html: '<div class="hq-marker">HQ</div>', iconSize: [40, 24], iconAnchor: [20, 12] });
L.marker(HQ, { icon: hqIcon, zIndexOffset: 1000 }).addTo(map)
  .bindPopup('<b>27 Bloomfield Ave, Bloomfield, NJ 07003</b><br>Our Office');

// 10 mile radius circle
L.circle(HQ, { radius: 16093, color: '#2563eb', fillColor: '#2563eb', fillOpacity: 0.05, weight: 1.5, dashArray: '5,5' }).addTo(map);

// State
let leads = [];
let markers = [];
let activeFilter = 'all';

// Fetch all rows from a table (handles Supabase 1000-row pagination)
async function fetchAllRows(table) {
  const rows = [];
  let offset = 0;
  const limit = 1000;
  while (true) {
    const url = `${SUPABASE_URL}/rest/v1/${table}?select=*&offset=${offset}&limit=${limit}`;
    const res = await fetch(url, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`
      }
    });
    if (!res.ok) throw new Error(`Failed to fetch ${table}: ${res.status}`);
    const batch = await res.json();
    rows.push(...batch);
    if (batch.length < limit) break;
    offset += limit;
  }
  return rows;
}

// Fetch leads from both Supabase tables
async function fetchLeads() {
  try {
    const [websiteLeads, noWebsiteLeads] = await Promise.all([
      fetchAllRows('leads_nj'),
      fetchAllRows('leads_no_website_nj')
    ]);

    // Normalize: leads_nj have websites, leads_no_website_nj don't
    const normalized = [
      ...websiteLeads.map(l => ({ ...l, has_website: true })),
      ...noWebsiteLeads.map(l => ({ ...l, has_website: false, website: '' }))
    ];

    return normalized;
  } catch (err) {
    console.error('Error fetching leads:', err);
    return null; // Return null on error so we keep existing data
  }
}

// Update stats panel
function updateStats(data) {
  const total = data.length;
  const withEmail = data.filter(l => l.email).length;
  const noEmail = total - withEmail;
  const withSite = data.filter(l => l.has_website).length;
  const noSite = total - withSite;
  document.getElementById('total').textContent = total;
  document.getElementById('withEmail').textContent = withEmail;
  document.getElementById('noEmail').textContent = noEmail;
  document.getElementById('withSite').textContent = withSite;
  document.getElementById('noSite').textContent = noSite;

  const now = new Date();
  document.getElementById('lastUpdated').textContent =
    'Updated ' + now.toLocaleTimeString();
}

function getColor(lead) {
  if (!lead.has_website) return '#f59e0b';
  if (lead.email) return '#22c55e';
  return '#ef4444';
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

function makePopup(l) {
  const emailHtml = l.email
    ? `<span class="popup-email">${escapeHtml(l.email)}</span>`
    : `<span class="popup-no-email">No email found</span>`;
  const tag = l.has_website
    ? '<span class="popup-tag tag-website">Has Website</span>'
    : '<span class="popup-tag tag-no-website">No Website</span>';
  const emailTag = l.email ? ' <span class="popup-tag tag-email">Has Email</span>' : '';
  const websiteRow = l.website
    ? `<div class="popup-row"><span class="popup-label">Web:</span> <a href="${escapeHtml(l.website)}" target="_blank" rel="noopener">${escapeHtml((l.website || '').substring(0,40))}...</a></div>`
    : '';
  return `
    <div class="popup-name">${escapeHtml(l.name)}</div>
    <div class="popup-row"><span class="popup-label">Type:</span> ${escapeHtml(l.category || l.keyword || '')}</div>
    <div class="popup-row"><span class="popup-label">Address:</span> ${escapeHtml((l.address || '').replace('Address: ', ''))}</div>
    <div class="popup-row"><span class="popup-label">Phone:</span> ${escapeHtml((l.phone || '').replace('Phone: ', ''))}</div>
    <div class="popup-row"><span class="popup-label">Email:</span> ${emailHtml}</div>
    ${websiteRow}
    <div style="margin-top:4px">${tag}${emailTag}</div>
  `;
}

function renderMarkers(filter) {
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  leads.forEach(l => {
    const lat = parseFloat(l.latitude);
    const lng = parseFloat(l.longitude);
    if (isNaN(lat) || isNaN(lng)) return;

    if (filter === 'email' && !l.email) return;
    if (filter === 'no-email' && l.email) return;
    if (filter === 'no-site' && l.has_website) return;

    const color = getColor(l);
    const marker = L.circleMarker([lat, lng], {
      radius: 6, fillColor: color, color: '#fff', weight: 1.5, fillOpacity: 0.85
    }).bindPopup(makePopup(l));
    marker.addTo(map);
    markers.push(marker);
  });
}

// Main: fetch + render + schedule refresh
async function loadAndRender() {
  const data = await fetchLeads();
  if (data !== null) {
    leads = data;
    updateStats(leads);
    renderMarkers(activeFilter);
  }
}

// Initial load
loadAndRender();

// Auto-refresh every 30 seconds
setInterval(loadAndRender, REFRESH_INTERVAL);

// Filter buttons
document.querySelectorAll('.filter-btns button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btns button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderMarkers(activeFilter);
  });
});

// Mobile toggle
const toggleBtn = document.getElementById('togglePanel');
const panel = document.getElementById('statsPanel');
toggleBtn.addEventListener('click', () => {
  panel.classList.toggle('collapsed');
  toggleBtn.textContent = panel.classList.contains('collapsed') ? '\u2630' : '\u2715';
});
</script>
</body>
</html>
