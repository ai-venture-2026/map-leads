<style>

  #map { width: 100%; height: 100vh; }
  .stats-panel {

  .toggle-panel {

  }
  .stats-panel h3 { margin-bottom: 8px; font-size: 16px; }
  .stats-panel .stat { display: flex; justify-content: space-between; padding: 4px 0; }
  .stats-panel .stat .val { font-weight: 700; }
  .legend { margin-top: 12px; border-top: 1px solid #eee; padding-top: 8px; }
  .legend-item { display: flex; align-items: center; gap: 6px; padding: 2px 0; font-size: 13px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
  .filter-btns { margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btns button {
    padding: 6px 12px; border: 1px solid #ddd; border-radius: 4px; cursor: pointer;
    font-size: 13px; background: #fff;
  }
  .filter-btns button.active { background: #2563eb; color: #fff; border-color: #2563eb; }
  .leaflet-popup-content { font-size: 13px; line-height: 1.5; max-width: 280px; }
  .popup-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
  .popup-row { display: flex; gap: 4px; flex-wrap: wrap; }
  .popup-label { color: #666; min-width: 55px; }
  .popup-email { color: #2563eb; word-break: break-all; }
  .popup-no-email { color: #ef4444; font-style: italic; }
  .popup-tag {
    display: inline-block; padding: 1px 6px; border-radius: 3px;
    font-size: 11px; margin-top: 4px;
  }
  .tag-website { background: #dcfce7; color: #166534; }
  .tag-no-website { background: #fee2e2; color: #991b1b; }
  .tag-email { background: #dbeafe; color: #1e40af; }
  .hq-marker {
    background: #000; color: #fff; padding: 4px 8px; border-radius: 4px;
    font-weight: 700; font-size: 12px; white-space: nowrap;
  }

  /* Mobile */
  @media (max-width: 640px) {
    .toggle-panel { display: block; }
    .stats-panel {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: 280px; max-width: 80vw; border-radius: 0;
      padding: 60px 16px 16px; max-height: 100vh;
    }
    .stats-panel.collapsed { transform: translateX(100%); }
    .filter-btns { flex-direction: column; }
    .filter-btns button { padding: 10px 12px; font-size: 14px; }
    .leaflet-popup-content { max-width: 220px; font-size: 12px; }
    .popup-name { font-size: 13px; }
  }
</style>

// Stats
const total = leads.length;
const withEmail = leads.filter(l => l.email).length;
const noEmail = total - withEmail;
const withSite = leads.filter(l => l.has_website).length;
const noSite = total - withSite;
document.getElementById('total').textContent = total;
document.getElementById('withEmail').textContent = withEmail;
document.getElementById('noEmail').textContent = noEmail;
document.getElementById('withSite').textContent = withSite;
document.getElementById('noSite').textContent = noSite;

function getColor(lead) {
  if (!lead.has_website) return '#f59e0b';
  if (lead.email) return '#22c55e';
  return '#ef4444';
}

function makePopup(l) {
  const emailHtml = l.email
    ? `<span class="popup-email">${l.email}</span>`
    : `<span class="popup-no-email">No email found</span>`;
  const tag = l.has_website
    ? '<span class="popup-tag tag-website">Has Website</span>'
    : '<span class="popup-tag tag-no-website">No Website</span>';
  const emailTag = l.email ? ' <span class="popup-tag tag-email">Has Email</span>' : '';
  return `
    <div class="popup-name">${l.name}</div>
    <div class="popup-row"><span class="popup-label">Type:</span> ${l.category || l.keyword || ''}</div>
    <div class="popup-row"><span class="popup-label">Address:</span> ${(l.address || '').replace('Address: ', '')}</div>
    <div class="popup-row"><span class="popup-label">Phone:</span> ${(l.phone || '').replace('Phone: ', '')}</div>
    <div class="popup-row"><span class="popup-label">Email:</span> ${emailHtml}</div>
    ${l.website ? `<div class="popup-row"><span class="popup-label">Web:</span> <a href="${l.website}" target="_blank">${l.website.substring(0,40)}...</a></div>` : ''}
    <div style="margin-top:4px">${tag}${emailTag}</div>
  `;
}

let markers = [];
function renderMarkers(filter) {
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  leads.forEach(l => {
    const lat = parseFloat(l.latitude);
    const lng = parseFloat(l.longitude);
    if (isNaN(lat) || isNaN(lng)) return;

    if (filter === 'email' && !l.email) return;
    if (filter === 'no-email' && l.email) return;
    if (filter === 'no-site' && l.has_website) return;

    const color = getColor(l);
    const marker = L.circleMarker([lat, lng], {
      radius: 6, fillColor: color, color: '#fff', weight: 1.5, fillOpacity: 0.85
    }).bindPopup(makePopup(l));
    marker.addTo(map);
    markers.push(marker);
  });
}

renderMarkers('all');

document.querySelectorAll('.filter-btns button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btns button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderMarkers(btn.dataset.filter);
  });
});

// Mobile toggle
const toggleBtn = document.getElementById('togglePanel');
const panel = document.getElementById('statsPanel');
toggleBtn.addEventListener('click', () => {
  panel.classList.toggle('collapsed');
  toggleBtn.textContent = panel.classList.contains('collapsed') ? '\u2630' : '\u2715';
});
</script>
